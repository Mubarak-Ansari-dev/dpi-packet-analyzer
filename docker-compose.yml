version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: dpi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: packet_analyzer

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dpi-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/packet_analyzer
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dpi-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  uploads:
